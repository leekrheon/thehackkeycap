<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>키캡 챌린지 - 30초 스매싱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#1C1C1C;
    font-family: 'Inter', -apple-system, "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    user-select:none;
  }

  /* 1080x1920 기준 캔버스를 화면에 맞춰 스케일 */
  #stage {
    position:relative;
    width:1080px;
    height:1920px;
    transform-origin: center center;
    left:50%; top:50%;
  }
  #stage-wrap {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  #bg {
    position:absolute; top:0; left:0;
    width:1080px; height:1920px;
    display:block;
    pointer-events:none;
  }

  /* ===== 타이머 (Figma: left 384.59 top 645.43 w 308.62, Inter Regular 114.423px, white, tracking -5.72px) ===== */
  #timer {
    position:absolute;
    top: 645.43px;
    left:0; width:1080px;
    text-align:center;
    font-family:'Inter', sans-serif;
    font-weight:400;
    font-size:114.423px;
    letter-spacing:-5.7212px;
    color:#FFFFFF;
    font-variant-numeric: tabular-nums;
    line-height:0.5;
    transition: color .15s ease;
  }
  #timer.danger { color:#FF3B30; }

  /* ===== 카운트(누른 횟수) — Figma: left 383 top 447 w 315, Inter Black 233.614px, #00E47A, tracking -11.68px ===== */
  #count {
    position:absolute;
    top: 447px;
    left:0; width:1080px;
    text-align:center;
    font-family:'Inter', sans-serif;
    font-weight:900;
    font-size:233.614px;
    letter-spacing:-11.6807px;
    color:#00E47A;
    line-height:0.5;
  }

  /* ===== F12 키캡 버튼 (Figma: left 269 top 868 w 536 h 521.912) ===== */
  #keycap {
    position:absolute;
    width:536px;
    height:521.912px;
    left: 269px;
    top: 868px;
    cursor:pointer;
  }
  #keycap img {
    position:absolute;
    top:0; left:0;
    width:536px; height:521.912px;
    display:block;
    -webkit-user-drag:none;
    pointer-events:none;
  }
  #f12-open { opacity:1; }
  #f12-close { opacity:0; }
  #keycap.pressed #f12-open { opacity:0; }
  #keycap.pressed #f12-close { opacity:1; }

  /* 눌렀을 때 살짝 눌리는 느낌 (선택 효과, 필요없으면 제거 가능) */
  #keycap.pressed { transform: translateY(4px); }

  /* ===== 결과 오버레이 ===== */
  #result {
    position:absolute; inset:0;
    background:rgba(0,0,0,0.72);
    display:none;
    align-items:center; justify-content:center;
    flex-direction:column;
    z-index:20;
  }
  #result.show { display:flex; }
  #result .r-title { color:#9A9A9A; font-size:36px; margin-bottom:20px; letter-spacing:2px;}
  #result .r-score { color:#fff; font-size:260px; font-weight:900; line-height:1; }
  #result .r-sub { color:#9A9A9A; font-size:28px; margin-top:24px; }
  #retry-btn {
    margin-top:60px;
    padding:26px 70px;
    font-size:32px;
    font-weight:700;
    color:#1C1C1C;
    background:#F5F5F5;
    border:none;
    border-radius:100px;
    cursor:pointer;
  }

</style>
</head>
<body>

<div id="stage-wrap">
  <div id="stage">
    <img id="bg" src="assets/bg.svg" alt="background">

    <div id="count">0</div>
    <div id="timer">30.00</div>

    <div id="keycap">
      <img id="f12-open" src="assets/f12-open.svg" alt="F12 open">
      <img id="f12-close" src="assets/f12-close.svg" alt="F12 close">
    </div>

    <div id="result">
      <div class="r-title">RESULT</div>
      <div class="r-score" id="final-score">0</div>
      <div class="r-sub">30초 동안 누른 횟수</div>
      <button id="retry-btn">다시 도전</button>
    </div>
  </div>
</div>

<audio id="click-sound" src="assets/click.mp3" preload="auto"></audio>

<script>
(function(){
  const STAGE_W = 1080, STAGE_H = 1920;
  const stage = document.getElementById('stage');
  const stageWrap = document.getElementById('stage-wrap');
  const keycap = document.getElementById('keycap');
  const timerEl = document.getElementById('timer');
  const countEl = document.getElementById('count');
  const resultOverlay = document.getElementById('result');
  const finalScoreEl = document.getElementById('final-score');
  const retryBtn = document.getElementById('retry-btn');
  const clickSound = document.getElementById('click-sound');

  const DURATION = 30; // seconds
  let running = false;
  let startTime = 0;
  let count = 0;
  let rafId = null;
  let releaseTimeout = null;

  // 1080x1920 캔버스를 화면 크기에 맞춰 스케일 (contain)
  function fitStage(){
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / STAGE_W, vh / STAGE_H);
    stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  function formatTime(remain){
    if (remain < 0) remain = 0;
    const sec = Math.floor(remain);
    const cent = Math.floor((remain - sec) * 100);
    return String(sec).padStart(2,'0') + '.' + String(cent).padStart(2,'0');
  }

  function tick(){
    const elapsed = (performance.now() - startTime) / 1000;
    const remain = DURATION - elapsed;

    if (remain <= 0){
      timerEl.textContent = '00.00';
      finishGame();
      return;
    }

    timerEl.textContent = formatTime(remain);
    timerEl.classList.toggle('danger', remain <= 5);

    rafId = requestAnimationFrame(tick);
  }

  function startGame(){
    count = 0;
    countEl.textContent = '0';
    resultOverlay.classList.remove('show');
    resultOverlay.style.display = 'none';
    running = true;
    startTime = performance.now();
    timerEl.classList.remove('danger');
    rafId = requestAnimationFrame(tick);
  }

  function finishGame(){
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    keycap.classList.remove('pressed');
    finalScoreEl.textContent = String(count);
    resultOverlay.style.display = 'flex';
    requestAnimationFrame(()=> resultOverlay.classList.add('show'));
  }

  function pressKey(){
    if (!running) return;
    count++;
    countEl.textContent = String(count);
    keycap.classList.add('pressed');

    // 진동
    if (navigator.vibrate) navigator.vibrate(35);

    // 효과음 (mp3 준비되면 자동 재생됨)
    try {
      clickSound.currentTime = 0;
      clickSound.play().catch(()=>{});
    } catch(e){}

    // 짧게 눌린 상태 유지 후 원상복귀 (빠르게 연타해도 매 입력마다 갱신)
    clearTimeout(releaseTimeout);
    releaseTimeout = setTimeout(()=>{
      if (running) keycap.classList.remove('pressed');
    }, 90);
  }

  // 클릭 / 터치 입력
  keycap.addEventListener('mousedown', (e)=>{ e.preventDefault(); pressKey(); });
  keycap.addEventListener('touchstart', (e)=>{ e.preventDefault(); pressKey(); }, {passive:false});

  // 실제 F12 키 입력도 지원 (키보드 auto-repeat 무시)
  window.addEventListener('keydown', (e)=>{
    if (e.key === 'F12'){
      e.preventDefault();
      if (e.repeat) return;
      pressKey();
    }
  });

  retryBtn.addEventListener('click', startGame);

  // 페이지 로드 시 바로 시작
  startGame();

})();
</script>
</body>
</html>
